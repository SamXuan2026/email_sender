<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮件发送系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        accent: '#f59e0b',
                        dark: '#1e293b',
                        light: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .shadow-card {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-envelope text-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-dark">邮件发送系统</h1>
            </div>
            <div class="flex space-x-4">
                <a href="/" class="px-3 py-2 text-primary font-medium border-b-2 border-primary">首页</a>
                <a href="/upload" class="px-3 py-2 text-gray-600 hover:text-primary transition-all-300">上传预览</a>
                <a href="/settings" class="px-3 py-2 text-gray-600 hover:text-primary transition-all-300">设置</a>
                <a href="/clear_session" class="px-3 py-2 text-gray-600 hover:text-primary transition-all-300">清除会话</a>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="flex-grow container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row gap-8 items-center">
            <div class="md:w-1/2">
                <h2 class="text-3xl font-bold text-dark mb-4">简单高效的邮件发送工具</h2>
                <p class="text-gray-600 mb-6">上传Excel文件，系统将自动根据邮箱地址发送包含数据的邮件，支持Excel格式。</p>
                <div class="flex flex-col sm:flex-row gap-4">
                    <a href="/upload" class="bg-primary hover:bg-blue-600 text-white font-medium py-3 px-6 rounded-lg transition-all-300 flex items-center justify-center">
                        <i class="fa fa-upload mr-2"></i> 上传文件
                    </a>
                    <a href="/settings" class="bg-white border border-primary text-primary font-medium py-3 px-6 rounded-lg hover:bg-gray-50 transition-all-300 flex items-center justify-center">
                        <i class="fa fa-cog mr-2"></i> SMTP设置
                    </a>
                </div>
            </div>
            <div class="md:w-1/2">
                <div class="bg-white rounded-xl shadow-card p-6">
                    <div class="flex justify-center mb-6">
                        <i class="fa fa-envelope-o text-primary text-6xl"></i>
                    </div>
                    <h3 class="text-xl font-semibold text-center mb-4">功能特点</h3>
                    <ul class="space-y-3">
                        <li class="flex items-center">
                            <i class="fa fa-check-circle text-secondary mr-2"></i>
                            <span>支持Excel文件格式</span>
                        </li>
                        <li class="flex items-center">
                            <i class="fa fa-check-circle text-secondary mr-2"></i>
                            <span>自定义SMTP服务器设置</span>
                        </li>
                        <li class="flex items-center">
                            <i class="fa fa-check-circle text-secondary mr-2"></i>
                            <span>详细的发送结果统计</span>
                        </li>
                        <li class="flex items-center">
                            <i class="fa fa-check-circle text-secondary mr-2"></i>
                            <span>简单直观的Web界面</span>
                        </li>
                        <li class="flex items-center">
                            <i class="fa fa-check-circle text-secondary mr-2"></i>
                            <span>支持自定义邮件主题</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-6">
        <div class="container mx-auto px-4 text-center">
            <p>© 2026 邮件发送系统 - 版权所有</p>
        </div>
    </footer>
</body>
</html>
